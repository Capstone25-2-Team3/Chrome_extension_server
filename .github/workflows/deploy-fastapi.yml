name: Deploy FastAPI Server

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy backend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/"
          target: "/home/ubuntu/Chrome_extension_server/"
          strip_components: 0

      - name: Setup and restart FastAPI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/Chrome_extension_server/backend

            # venv 생성 (없을 때만)
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            # 의존성 설치
            source venv/bin/activate
            pip install -r requirements.txt

            # systemd 서비스 파일 생성
            sudo tee /etc/systemd/system/gdgoc-fastapi.service > /dev/null << 'SERVICEEOF'
            [Unit]
            Description=GDGoC FastAPI Inference Server
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            Group=ubuntu
            WorkingDirectory=/home/ubuntu/Chrome_extension_server/backend
            ExecStart=/home/ubuntu/Chrome_extension_server/backend/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5
            Environment=PYTHONUNBUFFERED=1
            StandardOutput=journal
            StandardError=journal
            SyslogIdentifier=gdgoc-fastapi

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            sudo systemctl daemon-reload
            sudo systemctl enable gdgoc-fastapi
            sudo systemctl restart gdgoc-fastapi

            # 헬스체크 (최대 20초 대기)
            echo "Waiting for FastAPI to start..."
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
                echo "✅ FastAPI is up! (${i}s)"
                exit 0
              fi
              sleep 1
            done
            echo "⚠️ FastAPI may still be starting. Check: journalctl -u gdgoc-fastapi -n 20"
